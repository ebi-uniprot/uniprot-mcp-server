name: Docker Image CI for UniProt MCP Server

on:
  push:
    branches: [ "readme_live" ]
  pull_request:
    branches: [ "readme_live" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        version: latest  # Optional: you can specify a version if needed

    - name: Cache Docker layers
      uses: actions/cache@v3  # Updated to v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Login to GitHub Container Registry
      run: |
        echo ${{ secrets.GH_PAT }} | docker login ghcr.io --username ebi-uniprot --password-stdin

    - name: Build and push the Docker image
      run: |
        docker buildx build --platform linux/amd64,linux/arm64 --tag ghcr.io/ebi-uniprot/uniprot-mcp-server:latest --push .
