# GitLab CI/CD configuration for building and pushing Docker images

stages:
  - build

variables:
  # Docker image name
  IMAGE_NAME: $CI_REGISTRY_IMAGE

# Build and push Docker image
docker-build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:$CI_COMMIT_SHA .
    - docker push $IMAGE_NAME:latest
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA
  rules:
    # Run on main branch
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    # Allow manual triggers for any branch
    - when: manual
  tags:
    - docker